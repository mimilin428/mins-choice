<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命靈數計算｜Min's Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDF5E6;
            --card: #FFFFFF;
            --text: #5D4037;
            --accent: #E0D7C6;
            --shadow: 0 4px 20px rgba(93,64,55,0.10);
            --pink: #F8BBD0;
            --pink-deep: #f48fb1;
            --pink-text: #880E4F;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Serif TC', 'Hiragino Sans GB', 'Microsoft JhengHei', serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(248,187,208,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(224,215,198,0.25) 0%, transparent 60%);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px 60px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            animation: fadeUp 0.7s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── 頂部 ── */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--pink-text);
            text-decoration: none;
            font-size: 0.88rem;
            opacity: 0.8;
            margin-bottom: 16px;
            transition: opacity 0.2s;
        }
        .back-btn:hover { opacity: 1; }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 8px;
            letter-spacing: 0.04em;
        }

        .page-subtitle {
            font-size: 0.92rem;
            opacity: 0.75;
            line-height: 1.7;
            margin: 0;
        }

        /* ── 計算卡片 ── */
        .calc-card {
            background: var(--card);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }

        .calc-label {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--pink-text);
            letter-spacing: 0.06em;
            margin: 0 0 12px;
            opacity: 0.8;
        }

        .date-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
        }

        .date-inputs input {
            width: 100%;
            border: 2px solid var(--pink);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text);
            background: linear-gradient(135deg, #fff 70%, #fff0f5);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .date-inputs input:focus {
            border-color: var(--pink-deep);
            box-shadow: 0 0 0 3px rgba(248,187,208,0.3);
        }

        .date-inputs input::placeholder {
            color: #cbb9b0;
            font-size: 0.85rem;
        }

        .calc-btn {
            width: 100%;
            background: var(--pink);
            color: var(--pink-text);
            border: none;
            border-radius: 99px;
            padding: 13px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 10px rgba(248,187,208,0.5);
            letter-spacing: 0.04em;
        }

        .calc-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(248,187,208,0.7);
        }

        .calc-hint {
            font-size: 0.82rem;
            opacity: 0.6;
            text-align: center;
            margin: 12px 0 0;
        }

        /* ── 結果區 ── */
        #result-section {
            display: none;
            animation: fadeUp 0.5s ease both;
        }

        .result-number-card {
            background: linear-gradient(135deg, #fff8f0 0%, #fff0f5 100%);
            border: 2px solid var(--pink-deep);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(244,143,177,0.15);
        }

        .result-number-wrap {
            margin-bottom: 4px;
        }

        .result-number {
            font-size: 4rem;
            font-weight: 700;
            color: var(--pink-deep);
            line-height: 1;
            margin-bottom: 2px;
        }

        .result-number-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            display: inline;
        }

        .result-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 8px;
        }
            display: inline-block;
            background: var(--pink);
            color: var(--pink-text);
            font-size: 0.82rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 99px;
            margin-bottom: 14px;
        }

        .result-desc {
            font-size: 0.93rem;
            line-height: 1.8;
            opacity: 0.85;
            text-align: left;
        }

        /* ── 優缺點 ── */
        .trait-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 14px;
        }

        .trait-box {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .trait-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .trait-title.light { color: #4caf50; }
        .trait-title.dark  { color: #ef9a9a; }

        .trait-list {
            font-size: 0.85rem;
            line-height: 1.9;
            opacity: 0.85;
            word-break: break-all;
            text-align: left;
        }

        /* ── 計算說明 ── */
        .how-card {
            background: var(--card);
            border-radius: 14px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .how-title {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--pink-text);
            opacity: 0.8;
            letter-spacing: 0.06em;
            margin: 0 0 10px;
        }

        .how-text {
            font-size: 0.88rem;
            line-height: 1.8;
            opacity: 0.8;
        }

        .how-example {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-top: 10px;
            line-height: 1.8;
            opacity: 0.85;
        }

        /* ── 頁尾 ── */
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.82rem;
            opacity: 0.5;
            line-height: 1.8;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 頂部 -->
    <div class="page-header">
        <a href="index.html" class="back-btn">← 回到 Min's Studio</a>
        <h1 class="page-title">🔢 生命靈數計算</h1>
        <p class="page-subtitle">輸入你的生日，算出屬於你的數字密碼<br>看看宇宙給你安排了什麼能量 ✨</p>
    </div>

    <!-- 計算卡片 -->
    <div class="calc-card">
        <div class="calc-label">📅 輸入你的西元生日</div>
        <div class="date-inputs">
            <input type="number" id="input-year" placeholder="西元年（如1991）" min="1900" max="2099">
            <input type="number" id="input-month" placeholder="月（1-12）" min="1" max="12">
            <input type="number" id="input-day" placeholder="日（1-31）" min="1" max="31">
        </div>
        <button class="calc-btn" onclick="calculate()">✨ 計算我的生命靈數</button>
    </div>

    <!-- 結果區 -->
    <div id="result-section">
        <div class="result-number-card">
            <div class="result-number-wrap">
                <div class="result-number" id="result-num"></div>
                <div class="result-number-label" id="result-label"></div>
            </div>
            <div class="result-name" id="result-name"></div>
            <div class="result-keyword" id="result-keyword"></div>
            <div class="result-desc" id="result-desc"></div>
            <div class="trait-row">
                <div class="trait-box">
                    <div class="trait-title light">🌟 超能力</div>
                    <div class="trait-list" id="result-light"></div>
                </div>
                <div class="trait-box">
                    <div class="trait-title dark">🌙 挑戰面</div>
                    <div class="trait-list" id="result-dark"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 頁尾 -->
    <div class="footer">
        生命靈數僅供參考，人生掌握在自己手中 🌿<br>
        © Min's Studio
    </div>

</div>

<script>
    const numerologyData = {
        1: {
            name: "1 號人｜開創者",
            keyword: "獨立 · 領袖 · 創造",
            desc: "你是天生的領袖，充滿自信與強大的行動力，喜歡走出自己的路，不喜歡被束縛。點子源源不絕，只要你決定做一件事，通常都能做成。身邊的人常常被你的衝勁感染，不知不覺就跟著你走了。",
            light: "超會自己做決定、行動超快不拖拉、有獨特想法別人想不到、天生就有領袖氣場",
            dark: "有時太堅持己見、不太容易妥協、容易忽略別人感受"
        },
        2: {
            name: "2 號人｜協調者",
            keyword: "敏感 · 直覺 · 合作",
            desc: "你的直覺超準，常常一眼就能看穿別人的狀態，是朋友圈裡最懂得傾聽的那個人。你重視關係中的和諧，不喜歡衝突，總是默默地在背後維繫著大家的情感。細膩的心思讓你特別有溫度。",
            light: "超會察言觀色、朋友有事第一個發現、記得每個人的小細節、讓人覺得被理解",
            dark: "容易想太多、有時無法果斷決定、太在意別人怎麼看你"
        },
        3: {
            name: "3 號人｜表達者",
            keyword: "創意 · 樂觀 · 社交",
            desc: "你天生就有表達的才華，說話有趣、充滿創意，走進任何場合都能讓氣氛活起來。樂觀的能量是你最大的武器，即使遇到困難也能很快振作。你的存在本身就是一種療癒。",
            light: "說話超有梗讓人想聽、天生樂觀很能帶動氣氛、創意無限腦袋轉不停、交朋友完全不費力",
            dark: "容易三分鐘熱度、情緒起伏比較大、有時說太多忘了聽"
        },
        4: {
            name: "4 號人｜建設者",
            keyword: "踏實 · 穩定 · 責任",
            desc: "你是那種說到做到、值得信賴的人。做事有條理、不急不躁，喜歡把每一步都踩穩了再往前走。朋友遇到問題第一個想到你，因為你總是能給出最務實、最可行的建議。",
            light: "說到做到超可靠、做事超有條理不會亂、耐心超好不容易放棄、是朋友眼中的定心丸",
            dark: "有時太謹慎反而錯失機會、難以接受突然的改變、容易鑽牛角尖"
        },
        5: {
            name: "5 號人｜自由者",
            keyword: "自由 · 冒險 · 變化",
            desc: "你天生就需要自由，討厭被框架限制，對任何新奇的事物都充滿好奇。適應力超強，換個環境對你來說不是挑戰，而是新的冒險。你的生命就是一場精彩的探索旅程。",
            light: "換環境超快適應、好奇心讓你什麼都懂一點、活力滿滿帶動周圍的人、勇於嘗試別人不敢做的事",
            dark: "容易坐不住想換換口味、計畫趕不上變化、有時缺乏長遠方向"
        },
        6: {
            name: "6 號人｜照顧者",
            keyword: "慈愛 · 家庭 · 奉獻",
            desc: "你天生就有一種讓人安心的氣質，走到哪裡都像個小太陽，溫暖身邊的每一個人。你重視家人和朋友，願意為他們付出很多，是大家心中最有安全感的存在。",
            light: "讓人莫名覺得安心、超懂得照顧別人感受、對家人朋友非常付出、有責任心做事不推諉",
            dark: "容易忘了照顧自己、付出太多容易疲憊、有時太理想化人際關係"
        },
        7: {
            name: "7 號人｜思考者",
            keyword: "智慧 · 內省 · 直覺",
            desc: "你是個深度思考者，喜歡把事情想透徹再行動。直覺非常準，常常第一感就是對的。你不需要太多人，但需要有深度的連結。獨處對你來說不是孤獨，而是充電。",
            light: "直覺超準很少看走眼、思考深度別人跟不上、獨立自主不需要人哄、分析問題一針見血",
            dark: "容易想太多而行動慢、有時顯得疏離難親近、不擅長閒聊表面的話"
        },
        8: {
            name: "8 號人｜掌權者",
            keyword: "成就 · 財富 · 執行力",
            desc: "你有強大的執行力和商業頭腦，設定目標之後就會全力衝刺，不達目的不罷休。天生對金錢和資源有敏銳的判斷力，知道怎麼讓事情有效率地運作。你就是那種說要成功就會成功的人。",
            light: "執行力超強說做就做、對數字和資源超敏感、目標明確不容易被動搖、天生有管理和領導的氣場",
            dark: "有時太強勢讓人有壓力、容易忽略過程只看結果、工作和生活容易失衡"
        },
        9: {
            name: "9 號人｜博愛者",
            keyword: "博愛 · 智慧 · 使命感",
            desc: "你有強烈的使命感，心裡裝著的不只是自己，還有身邊的人、甚至整個世界。你多才多藝，對很多事都有興趣，更重要的是你願意把自己的能量分享給需要的人。很多人被你身上那股想讓世界更好的力量深深吸引。",
            light: "胸懷大志不只想著自己、多才多藝什麼都能聊、樂於分享不會藏私、讓人覺得被愛和被接納",
            dark: "容易對人期望太高、有時想太遠忽略眼前、情緒容易隨環境起伏"
        }
    };

    function calculate() {
        const year = document.getElementById('input-year').value;
        const month = document.getElementById('input-month').value;
        const day = document.getElementById('input-day').value;

        if (!year || !month || !day) {
            alert('請完整填入年、月、日喔！');
            return;
        }

        // 把所有數字加總
        const fullDate = `${year}${month.padStart(2,'0')}${day.padStart(2,'0')}`;
        let sum = 0;
        for (let ch of fullDate) sum += parseInt(ch);

        // 一直加到個位數
        while (sum >= 10) {
            let newSum = 0;
            for (let ch of String(sum)) newSum += parseInt(ch);
            sum = newSum;
        }

        const data = numerologyData[sum];
        if (!data) return;

        document.getElementById('result-num').textContent = sum;
        document.getElementById('result-label').textContent = `${sum} 號人`;
        document.getElementById('result-name').textContent = data.name.split('｜')[1] ?? data.name;
        document.getElementById('result-keyword').textContent = data.keyword;
        // 描述句號後換行
        const descEl = document.getElementById('result-desc');
        const sentences = data.desc.split('。').filter(s => s.trim());
        descEl.innerHTML = sentences.map(s => s + '。').join('<br>');

        // 光明面每8字換行
        const lightEl = document.getElementById('result-light');
        const lightText = data.light;
        let lightLines = [];
        for (let i = 0; i < lightText.length; i += 8) {
            lightLines.push(lightText.slice(i, i + 8));
        }
        lightEl.innerHTML = lightLines.join('<br>');

        // 挑戰面每8字換行
        const darkEl = document.getElementById('result-dark');
        const darkText = data.dark;
        let darkLines = [];
        for (let i = 0; i < darkText.length; i += 8) {
            darkLines.push(darkText.slice(i, i + 8));
        }
        darkEl.innerHTML = darkLines.join('<br>');

        const section = document.getElementById('result-section');
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 按 Enter 也可以計算
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') calculate();
    });
</script>
</body>
</html>
